services:
  - type: web
    name: sqlite-file-cabinet
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_TOKEN_SECRET
        sync: false
      - key: STORAGE_ROOT
        value: /opt/render/project/src/storage
      - key: MAX_FILE_SIZE_BYTES
        value: "1073741824"
